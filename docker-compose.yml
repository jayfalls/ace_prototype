version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ace_postgres
    environment:
      POSTGRES_USER: ace
      POSTGRES_PASSWORD: ace
      POSTGRES_DB: ace_framework
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ace"]
      interval: 5s
      timeout: 5s
      retries: 5

  nats:
    image: nats:2.10-alpine
    container_name: ace_nats
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ace_api
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: ace
      DATABASE_PASSWORD: ace
      DATABASE_NAME: ace_framework
      DATABASE_SSLMODE: disable
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 168h
      LOG_LEVEL: info
      LOG_FORMAT: json
      LLM_PROVIDER: openrouter
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-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}
      LLM_DEFAULT_MODEL: openrouter/free
      LLM_TIMEOUT: 120
      NATS_URL: nats://nats:4222
      NATS_USE_IN_MEMORY: "false"
      TELEMETRY_ENABLED: "true"
      TELEMETRY_ENDPOINT: localhost:4317
      TELEMETRY_SERVICE_NAME: ace-framework
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ace_frontend
    environment:
      PUBLIC_API_URL: http://api:8080
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
