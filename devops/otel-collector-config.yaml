receivers:
  # OTLP receiver for traces and metrics from services
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  
  # Prometheus receiver for scraping metrics from services
  prometheus:
    config:
      scrape_configs:
        - job_name: 'ace_api'
          static_configs:
            - targets: ['ace_api:8080']
          metrics_path: '/metrics'
  
  # Filelog receiver - reads container stdout from Docker log files
  filelog:
    include: ["/var/lib/docker/containers/*/*-json.log"]
    start_at: end

processors:
  # Batch processor for efficient export
  batch:
    timeout: 10s
    send_batch_size: 1000
  
  # Memory limiter to prevent OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 1000
  
  # Resource processor for adding attributes
  resource:
    attributes:
      - key: service.namespace
        value: ace-framework
        action: upsert

exporters:
  # Tempo exporter for traces
  otlp/tempo:
    endpoint: tempo:4316
    tls:
      insecure: true
  
  # Loki exporter - uses OTLP HTTP protocol (Loki 3.x supports OTLP)
  # Endpoint: /otlp/v1/logs for OTLP protocol
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true
  
  # Prometheus exporter for metrics
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otel

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch, memory_limiter, resource]
      exporters: [otlp/tempo]
    logs:
      receivers: [filelog]
      processors: [batch, memory_limiter, resource]
      exporters: [otlphttp/loki]
    metrics:
      receivers: [otlp, prometheus]
      processors: [batch, memory_limiter, resource]
      exporters: [prometheus]
