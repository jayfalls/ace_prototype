services:
  ace_api:
    build:
      context: ..
      dockerfile: devops/prod/api.Containerfile
    container_name: ace_api
    depends_on:
      ace_db:
        condition: service_healthy
      ace_broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST:-ace_db}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-ace}
      - API_PORT=${API_PORT:-8080}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-*}
      - NATS_URL=${NATS_URL:-nats://ace_broker:4222}
    networks:
      - ace_network

  ace_fe:
    build:
      context: ..
      dockerfile: devops/prod/fe.Containerfile
    container_name: ace_fe
    depends_on:
      ace_api:
        condition: service_healthy
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
      - NODE_ENV=production
    networks:
      - ace_network

  ace_db:
    image: postgres:18
    container_name: ace_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-ace}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - ace_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  ace_broker:
    image: nats:2.12-alpine
    container_name: ace_broker
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "4222:4222"
    command: ["-js", "-m", "8222"]
    volumes:
      - nats_data:/data
    networks:
      - ace_network

networks:
  ace_network:
    driver: bridge

volumes:
  postgres_data:
  nats_data:
