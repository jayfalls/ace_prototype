services:
  ace_api:
    build:
      context: ..
      dockerfile: devops/prod/api.Containerfile
    container_name: ace_api
    env_file:
      - ../.env
    depends_on:
      ace_db:
        condition: service_healthy
      ace_broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    ports:
      - "${API_PORT}:8080"
    networks:
      - ace_network

  ace_fe:
    build:
      context: ..
      dockerfile: devops/prod/fe.Containerfile
    container_name: ace_fe
    env_file:
      - ../.env
    depends_on:
      ace_api:
        condition: service_healthy
    ports:
      - "${FE_PORT}:5173"
    environment:
      - NODE_ENV=production
    networks:
      - ace_network

  ace_db:
    image: postgres:18
    container_name: ace_db
    env_file:
      - ../.env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - ace_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  ace_broker:
    image: nats:2.12-alpine
    container_name: ace_broker
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${NATS_PORT}:4222"
    command: ["-js", "-m", "8222"]
    volumes:
      - nats_data:/data
    networks:
      - ace_network

networks:
  ace_network:
    driver: bridge

volumes:
  postgres_data:
  nats_data:

  # Observability volumes
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
  otel_collector_logs:

  ###############################
  # Observability Stack
  ###############################

  prometheus:
    image: prom/prometheus
    container_name: ace_prometheus
    env_file:
      - ../.env
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:Z
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ace_network

  otel-collector:
    image: otel/opentelemetry-collector-contrib
    container_name: ace_otel_collector
    env_file:
      - ../.env
    volumes:
      - ../otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
      - otel_collector_logs:/var/log/otel
    ports:
      - "${OTEL_COLLECTOR_OTLP_GRPC_PORT}:4317"   # OTLP gRPC
      - "${OTEL_COLLECTOR_OTLP_HTTP_PORT}:4318"   # OTLP HTTP
      - "${OTEL_COLLECTOR_PROMETHEUS_PORT}:8889"   # Prometheus metrics
      - "${OTEL_COLLECTOR_HEALTH_PORT}:8888"      # OTel Collector health check
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=tempo:4316
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ace_network

  loki:
    image: grafana/loki
    container_name: ace_loki
    env_file:
      - ../.env
    volumes:
      - loki_data:/loki
    ports:
      - "${LOKI_PORT}:3100"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ace_network

  tempo:
    image: grafana/tempo
    container_name: ace_tempo
    env_file:
      - ../.env
    volumes:
      - ./tempo-config.yml:/etc/tempo-config.yml:ro
      - tempo_data:/var/tempo
    command: [ "--config.file=/etc/tempo-config.yml" ]
    ports:
      - "${TEMPO_OTLP_GRPC_PORT}:4316"   # OTLP gRPC
      - "${TEMPO_OTLP_HTTP_PORT}:4315"   # OTLP HTTP
      - "${TEMPO_HEALTH_PORT}:4314"       # Tempo health check
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4314/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ace_network

  grafana:
    image: grafana/grafana
    container_name: ace_grafana
    env_file:
      - ../.env
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ace_network
