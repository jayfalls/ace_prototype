server:
  http_listen_port: 4314
  grpc_listen_port: 4316

distributor:
  receivers:
    otlp:
      protocols:
        http:
        grpc:

ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/metrics
  remote_write:
    - url: http://prometheus:9090/api/v1/write
      send_exemplars: true
      send_metadata: true
