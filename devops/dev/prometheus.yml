global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # OTel Collector metrics (includes all service metrics via OTLP)
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
    metrics_path: '/metrics'

  # Loki metrics
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
    metrics_path: '/metrics'

  # Tempo metrics (port 3200 has HTTP API, port 4314 has OTLP gRPC)
  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
    metrics_path: '/metrics'

  # NATS metrics via exporter
  - job_name: 'nats'
    static_configs:
      - targets: ['nats-exporter:7777']

  # PostgreSQL metrics via exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  # ACE API metrics
  - job_name: 'ace-api'
    static_configs:
      - targets: ['ace_api:8080']
    metrics_path: '/metrics'
