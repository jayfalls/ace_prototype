services:
  ace_api:
    build:
      context: ../..
      dockerfile: devops/dev/api.Containerfile
    container_name: ace_api
    env_file:
      - ../../.env
    depends_on:
      ace_db:
        condition: service_healthy
      ace_broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    user: root
    ports:
      - "${API_PORT}:8080"
    volumes:
      - ../../backend:/app:Z
    working_dir: /app
    command: /bin/sh -c "cd /app/services/api && air -c air.toml"
    networks:
      - ace_network

  ace_fe:
    build:
      context: ../..
      dockerfile: devops/dev/fe.Containerfile
    container_name: ace_fe
    env_file:
      - ../../.env
    depends_on:
      ace_api:
        condition: service_healthy
    user: root
    ports:
      - "${FE_PORT}:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ../../frontend:/app:Z
      - /app/node_modules
    command: npm run dev
    networks:
      - ace_network

  ace_db:
    image: postgres:18
    container_name: ace_db
    env_file:
      - ../../.env
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - ace_network

  ace_broker:
    image: nats:2.12-alpine
    container_name: ace_broker
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "${NATS_PORT}:4222"
    command: ["-js", "-m", "8222"]
    volumes:
      - nats_data:/data
    networks:
      - ace_network

  ###############################
  # Exporters
  ###############################

  nats-exporter:
    image: natsio/prometheus-nats-exporter:latest
    container_name: ace_nats_exporter
    command: -varz http://ace_broker:8222
    ports:
      - "55678:7777"
    networks:
      - ace_network
    depends_on:
      - ace_broker

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: ace_postgres_exporter
    environment:
      - DATA_SOURCE_NAME=postgresql://${POSTGRES_USER:-ace}:${POSTGRES_PASSWORD:-ace_password}@ace_db:5432/${POSTGRES_DB:-ace}?sslmode=disable
    ports:
      - "55679:9187"
    networks:
      - ace_network
    depends_on:
      - ace_db

  ###############################
  # Observability Stack
  ###############################

  prometheus:
    image: prom/prometheus
    container_name: ace_prometheus
    env_file:
      - ../../.env
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:Z
      - prometheus_data:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ace_network

  otel-collector:
    image: otel/opentelemetry-collector-contrib
    container_name: ace_otel_collector
    env_file:
      - ../../.env
    volumes:
      - ../otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:Z
      - otel_collector_logs:/var/log/otel
      - /var/lib/docker/containers:/var/lib/docker/containers:ro,Z
    user: "0:0"
    ports:
      - "${OTEL_COLLECTOR_OTLP_GRPC_PORT}:4317"   # OTLP gRPC
      - "${OTEL_COLLECTOR_OTLP_HTTP_PORT}:4318"   # OTLP HTTP
      - "${OTEL_COLLECTOR_PROMETHEUS_PORT}:8889"   # Prometheus metrics
      - "${OTEL_COLLECTOR_HEALTH_PORT}:13133"     # OTel Collector health check
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=tempo:4316
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:13133/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ace_network

  loki:
    image: grafana/loki:3.5.0
    container_name: ace_loki
    env_file:
      - ../../.env
    volumes:
      - loki_data:/loki
    ports:
      - "${LOKI_PORT}:3100"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ace_network

  tempo:
    image: grafana/tempo:2.9.1
    container_name: ace_tempo
    env_file:
      - ../../.env
    volumes:
      - ./tempo-config.yml:/etc/tempo-config.yml:ro,Z
      - tempo_data:/var/tempo
    command: [ "--config.file=/etc/tempo-config.yml" ]
    ports:
      - "${TEMPO_OTLP_GRPC_PORT}:4316"   # OTLP gRPC
      - "${TEMPO_OTLP_HTTP_PORT}:4315"   # OTLP HTTP
      - "3200:3200"                      # Tempo HTTP API
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ace_network

  grafana:
    image: grafana/grafana
    container_name: ace_grafana
    env_file:
      - ../../.env
    volumes:
      - grafana_data:/var/lib/grafana
      - ../provisioning/datasources:/etc/grafana/provisioning/datasources:ro,Z
      - ../provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro,Z
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ace_network

networks:
  ace_network:
    driver: bridge

volumes:
  postgres_data:
  nats_data:

  # Observability volumes
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:

  # OTel collector log path
  otel_collector_logs:
