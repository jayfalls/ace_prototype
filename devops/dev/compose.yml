services:
  ace_api:
    build:
      context: ../..
      dockerfile: devops/dev/api.Containerfile
    container_name: ace_api
    env_file:
      - ../../.env
    depends_on:
      ace_db:
        condition: service_healthy
      ace_broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    user: root
    ports:
      - "8080:8080"
    volumes:
      - ../../backend:/app:Z
    working_dir: /app
    command: /bin/sh -c "cd /app/services/api && air -c air.toml"
    networks:
      - ace_network

  ace_fe:
    build:
      context: ../..
      dockerfile: devops/dev/fe.Containerfile
    container_name: ace_fe
    env_file:
      - ../../.env
    depends_on:
      ace_api:
        condition: service_healthy
    user: root
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
    volumes:
      - ../../frontend:/app:Z
      - /app/node_modules
    command: npm run dev
    networks:
      - ace_network

  ace_db:
    image: postgres:18
    container_name: ace_db
    env_file:
      - ../../.env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - ace_network

  ace_broker:
    image: nats:2.12-alpine
    container_name: ace_broker
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "4222:4222"
    command: ["-js", "-m", "8222"]
    volumes:
      - nats_data:/data
    networks:
      - ace_network

  ###############################
  # Observability Stack
  ###############################

  prometheus:
    image: prom/prometheus
    container_name: ace_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ace_network

  otel-collector:
    image: otel/opentelemetry-collector-contrib
    container_name: ace_otel_collector
    volumes:
      - ../otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
      - otel_collector_logs:/var/log/otel
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8889:8889"   # Prometheus metrics
      - "8888:8888"   # OTel Collector health check
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      prometheus:
        condition: service_healthy
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8888/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ace_network

  loki:
    image: grafana/loki
    container_name: ace_loki
    volumes:
      - loki_data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ace_network

  tempo:
    image: grafana/tempo
    container_name: ace_tempo
    volumes:
      - tempo_data:/var/tempo
    ports:
      - "4316:4316"   # OTLP gRPC
      - "4315:4315"   # OTLP HTTP
      - "4314:4314"   # Tempo health check
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4314/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ace_network

  grafana:
    image: grafana/grafana
    container_name: ace_grafana
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ace_network

networks:
  ace_network:
    driver: bridge

volumes:
  postgres_data:
  nats_data:

  # Observability volumes
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:

  # OTel collector log path
  otel_collector_logs:
