services:
  ace_api:
    build:
      context: ../..
      dockerfile: devops/dev/api.Containerfile
    container_name: ace_api
    depends_on:
      ace_db:
        condition: service_healthy
      ace_broker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    user: root
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE}
      - API_PORT=${API_PORT}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - NATS_URL=${NATS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS}
      - LOG_LEVEL=${LOG_LEVEL}
    volumes:
      - ../../backend:/app:Z
    working_dir: /app
    command: /bin/sh -c "cd /app/services/api && air -c air.toml"
    networks:
      - ace_network

  ace_fe:
    build:
      context: ../..
      dockerfile: devops/dev/fe.Containerfile
    container_name: ace_fe
    depends_on:
      ace_api:
        condition: service_healthy
    user: root
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8080}
      - NODE_ENV=development
    volumes:
      - ../../frontend:/app:Z
      - /app/node_modules
    command: npm run dev
    networks:
      - ace_network

  ace_db:
    image: postgres:18
    container_name: ace_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-ace}
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - ace_network

  ace_broker:
    image: nats:2.12-alpine
    container_name: ace_broker
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    ports:
      - "4222:4222"
    command: ["-js", "-m", "8222"]
    volumes:
      - nats_data:/data
    networks:
      - ace_network

networks:
  ace_network:
    driver: bridge

volumes:
  postgres_data:
  nats_data:
